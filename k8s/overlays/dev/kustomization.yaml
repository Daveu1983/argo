apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patches/replica-count.yaml
    target:
      kind: Deployment
  - path: patches/resource-limits.yaml
    target:
      kind: Deployment

configMapGenerator:
  - name: frontend-config
    behavior: merge
    literals:
      - ENVIRONMENT=dev
  - name: api-gateway-config
    behavior: merge
    literals:
      - ENVIRONMENT=dev
  - name: user-service-config
    behavior: merge
    literals:
      - ENVIRONMENT=dev
  - name: order-service-config
    behavior: merge
    literals:
      - ENVIRONMENT=dev
  - name: notification-service-config
    behavior: merge
    literals:
      - ENVIRONMENT=dev
